<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="100%" height="100%" style="background: #0d0f14; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; border-radius: 12px; border: 1px solid #1f2430;">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1"/>
    </pattern>

    <!-- Glowing Drop Shadows -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Linear Gradients -->
    <linearGradient id="grad-rpi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2030" />
      <stop offset="100%" stop-color="#111420" />
    </linearGradient>
    <linearGradient id="grad-camera" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
    <linearGradient id="grad-lidar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6d00" />
      <stop offset="100%" stop-color="#ffa726" />
    </linearGradient>
    <linearGradient id="grad-hailo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c4dff" />
      <stop offset="100%" stop-color="#b388ff" />
    </linearGradient>
    <linearGradient id="grad-fusion" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c853" />
      <stop offset="100%" stop-color="#69f0ae" />
    </linearGradient>
    <linearGradient id="grad-fastapi" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009688" />
      <stop offset="100%" stop-color="#80cbc4" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00e5ff" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ff6d00" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#7c4dff" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00c853" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#4f5b70" />
    </marker>
  </defs>

  <!-- Grid overlay -->
  <rect width="960" height="580" fill="url(#grid)" />

  <!-- ═══════════════════════════════════════════════════════
       TITLE & LEGEND
  ═══════════════════════════════════════════════════════ -->
  <text x="30" y="45" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="0.5">Edge AI Indoor Navigation &amp; Object Awareness</text>
  <text x="30" y="68" font-size="12" fill="#6b7a99">System Architecture &amp; Data Pipeline Flow Diagram</text>

  <!-- ═══════════════════════════════════════════════════════
       HOST BOUNDARY: RASPBERRY PI 5
  ═══════════════════════════════════════════════════════ -->
  <rect x="230" y="100" width="460" height="450" rx="16" fill="url(#grad-rpi)" stroke="#252b3a" stroke-width="2" />
  <!-- RPi 5 Label -->
  <rect x="250" y="85" width="130" height="26" rx="6" fill="#151820" stroke="#252b3a" stroke-width="1.5" />
  <circle cx="265" cy="98" r="5" fill="#e91e63" />
  <text x="280" y="102" font-size="11" font-weight="700" fill="#e91e63" letter-spacing="1">RASPBERRY PI 5</text>

  <!-- ═══════════════════════════════════════════════════════
       INPUT DEVICES (EXTERNAL)
  ═══════════════════════════════════════════════════════ -->
  
  <!-- Camera Module 3 -->
  <g transform="translate(30, 140)">
    <rect x="0" y="0" width="160" height="85" rx="10" fill="#151820" stroke="#00bcd4" stroke-width="1.5" filter="url(#glow-cyan)"/>
    <text x="15" y="28" font-size="12" font-weight="700" fill="#00e5ff">Pi Camera Mod 3</text>
    <text x="15" y="48" font-size="11" fill="#e0e6f0">1280×720 @ 30 fps</text>
    <text x="15" y="66" font-size="10" fill="#6b7a99">CSI Ribbon Cable</text>
    <!-- Camera Icon (Lens representation) -->
    <circle cx="130" cy="42" r="16" fill="#0d0f14" stroke="#00e5ff" stroke-width="2"/>
    <circle cx="130" cy="42" r="6" fill="#00e5ff" />
  </g>

  <!-- Hokuyo LiDAR -->
  <g transform="translate(30, 360)">
    <rect x="0" y="0" width="160" height="85" rx="10" fill="#151820" stroke="#ff6d00" stroke-width="1.5" filter="url(#glow-orange)"/>
    <text x="15" y="28" font-size="12" font-weight="700" fill="#ff6d00">Hokuyo Lidar</text>
    <text x="15" y="48" font-size="11" fill="#e0e6f0">URG-04LX (240°)</text>
    <text x="15" y="66" font-size="10" fill="#6b7a99">USB-CDC / ttyACM0</text>
    <!-- Lidar Icon (Scanner representation) -->
    <path d="M 120 55 L 140 55 L 130 30 Z" fill="#ff6d00" />
    <path d="M 120 30 Q 130 18 140 30" fill="none" stroke="#ff6d00" stroke-width="1.5" stroke-dasharray="2,2" />
  </g>

  <!-- ═══════════════════════════════════════════════════════
       PIPELINE BLOCKS (ON HOST)
  ═══════════════════════════════════════════════════════ -->

  <!-- YOLO Pipeline -->
  <g transform="translate(260, 140)">
    <rect x="0" y="0" width="180" height="75" rx="8" fill="#1c2030" stroke="#252b3a" stroke-width="1" />
    <text x="15" y="24" font-size="11" font-weight="700" fill="#6b7a99" letter-spacing="0.5">INFERENCE LAYER</text>
    <text x="15" y="44" font-size="13" font-weight="700" fill="#e0e6f0">YOLOv8 Pipeline</text>
    <text x="15" y="60" font-size="11" fill="#6b7a99">CPU Fallback/Pre-process</text>
  </g>

  <!-- HailoRT Engine & HAT+ -->
  <g transform="translate(480, 140)">
    <rect x="0" y="0" width="180" height="75" rx="8" fill="#151820" stroke="#7c4dff" stroke-width="1.5" filter="url(#glow-purple)"/>
    <!-- NPU tag -->
    <rect x="130" y="10" width="40" height="15" rx="3" fill="#7c4dff" />
    <text x="138" y="21" font-size="9" font-weight="700" fill="#ffffff">NPU</text>
    <text x="15" y="24" font-size="11" font-weight="700" fill="#7c4dff" letter-spacing="0.5">HAILO-8L HAT+</text>
    <text x="15" y="44" font-size="13" font-weight="700" fill="#e0e6f0">HailoRT Engine</text>
    <text x="15" y="60" font-size="11" fill="#b388ff">18–22 FPS · yolov8n.hef</text>
  </g>

  <!-- LiDAR Scan Processor -->
  <g transform="translate(260, 365)">
    <rect x="0" y="0" width="180" height="75" rx="8" fill="#151820" stroke="#ff6d00" stroke-width="1.5" filter="url(#glow-orange)"/>
    <text x="15" y="24" font-size="11" font-weight="700" fill="#ff6d00" letter-spacing="0.5">SCAN PROCESSING</text>
    <text x="15" y="44" font-size="13" font-weight="700" fill="#e0e6f0">SCIP 2.0 Driver</text>
    <text x="15" y="60" font-size="11" fill="#ffa726">Polar Map / Sectors</text>
  </g>

  <!-- Sensor Fusion Engine -->
  <g transform="translate(370, 255)">
    <rect x="0" y="0" width="180" height="80" rx="10" fill="#151820" stroke="#00c853" stroke-width="1.5" filter="url(#glow-green)"/>
    <text x="15" y="24" font-size="11" font-weight="700" fill="#00c853" letter-spacing="0.5">DATA CORRELATION</text>
    <text x="15" y="45" font-size="13" font-weight="700" fill="#e0e6f0">Sensor Fusion</text>
    <text x="15" y="62" font-size="11" fill="#69f0ae">IoU Tracker &amp; Threat Assessor</text>
  </g>

  <!-- FastAPI Backend -->
  <g transform="translate(260, 460)">
    <rect x="0" y="0" width="400" height="70" rx="8" fill="#1c2030" stroke="#009688" stroke-width="1.5" />
    <text x="15" y="22" font-size="11" font-weight="700" fill="#009688" letter-spacing="0.5">WEB SERVER BACKEND</text>
    <text x="15" y="44" font-size="14" font-weight="700" fill="#e0e6f0">FastAPI Async WebSockets</text>
    <text x="210" y="44" font-size="11" fill="#80cbc4">/camera  /lidar  /fusion  /telemetry</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       OUTPUT / CONSUMER (DASHBOARD)
  ═══════════════════════════════════════════════════════ -->
  
  <!-- Browser UI Dashboard -->
  <g transform="translate(760, 200)">
    <rect x="0" y="0" width="170" height="180" rx="12" fill="#151820" stroke="#4f5b70" stroke-width="1.5" />
    <!-- Browser Titlebar Mock -->
    <rect x="0" y="0" width="170" height="24" rx="12" fill="#1c2030" />
    <circle cx="10" cy="12" r="3" fill="#ff1744" />
    <circle cx="20" cy="12" r="3" fill="#ffea00" />
    <circle cx="30" cy="12" r="3" fill="#00e676" />
    <text x="45" y="16" font-size="9" fill="#6b7a99" font-weight="700">DASHBOARD</text>

    <!-- Screen Mock -->
    <rect x="10" y="34" width="150" height="60" rx="4" fill="#0d0f14" stroke="#252b3a" />
    <!-- Stream overlay representation -->
    <circle cx="40" cy="64" r="16" fill="none" stroke="#00e5ff" stroke-width="1.5" />
    <path d="M 40 40 L 40 88" stroke="#ff6d00" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="75" y="52" font-size="9" fill="#00e676" font-weight="700">CPU Fallback</text>
    <text x="75" y="66" font-size="8" fill="#e0e6f0">22.4 fps</text>
    <text x="75" y="78" font-size="8" fill="#ffea00">LiDAR Active</text>

    <!-- Light/Dark toggle representation -->
    <rect x="10" y="105" width="150" height="30" rx="4" fill="#eaedf2" />
    <text x="20" y="123" font-size="8" fill="#24292f" font-weight="700">Light Theme</text>
    <!-- Sun icon representation -->
    <circle cx="130" cy="120" r="5" fill="#ffa726" />
    
    <!-- Gauges representation -->
    <circle cx="30" cy="158" r="10" fill="none" stroke="#7c4dff" stroke-width="3" stroke-dasharray="40,25" />
    <text x="50" y="161" font-size="9" fill="#e0e6f0">Sys Telemetry</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       INTERCONNECTIONS (FLOW PIPES & ARROWS)
  ═══════════════════════════════════════════════════════ -->

  <!-- Camera -> YOLO Pipeline -->
  <path d="M 190 182 L 250 182" fill="none" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrow-cyan)" />
  <text x="195" y="174" font-size="9" fill="#00bcd4" font-weight="700">BGR Stream</text>

  <!-- YOLO <-> HailoRT Engine (Bi-directional PCIe) -->
  <path d="M 440 162 L 472 162" fill="none" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow-purple)" />
  <path d="M 480 192 L 448 192" fill="none" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow-purple)" />
  <text x="442" y="152" font-size="8" fill="#b388ff" font-weight="700">Preprocess</text>
  <text x="442" y="210" font-size="8" fill="#b388ff" font-weight="700">Detections</text>

  <!-- LiDAR -> Scan Processor -->
  <path d="M 190 402 L 250 402" fill="none" stroke="#ff6d00" stroke-width="2" marker-end="url(#arrow-orange)" />
  <text x="198" y="394" font-size="9" fill="#ff6d00" font-weight="700">SCIP Scans</text>

  <!-- YOLO Pipeline -> Sensor Fusion -->
  <path d="M 350 215 L 350 270 Q 350 280 370 280" fill="none" stroke="#7c4dff" stroke-width="1.5" marker-end="url(#arrow-purple)" />
  <text x="300" y="244" font-size="9" fill="#b388ff" font-weight="700">BBoxes</text>

  <!-- Scan Processor -> Sensor Fusion -->
  <path d="M 350 365 L 350 310 Q 350 300 370 300" fill="none" stroke="#ff6d00" stroke-width="1.5" marker-end="url(#arrow-orange)" />
  <text x="295" y="340" font-size="9" fill="#ff6d00" font-weight="700">Sectors / Min D</text>

  <!-- Camera (bypass) -> Sensor Fusion (for overlays) -->
  <path d="M 190 200 L 210 200 L 210 270 L 370 270" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- Sensor Fusion -> FastAPI Backend -->
  <path d="M 460 335 L 460 450" fill="none" stroke="#00c853" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="466" y="415" font-size="9" fill="#00c853" font-weight="700">Correlated Obj</text>

  <!-- Telemetry (Background) -> FastAPI Backend -->
  <path d="M 580 215 L 580 450" fill="none" stroke="#4f5b70" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-gray)" />
  <text x="586" y="415" font-size="9" fill="#6b7a99" font-weight="700">Sys Metrics</text>

  <!-- Direct Camera Stream -> FastAPI -->
  <path d="M 230 190 L 220 190 L 220 480 L 250 480" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- FastAPI -> Dashboard (WebSockets) -->
  <path d="M 660 495 L 730 495 L 730 290 L 750 290" fill="none" stroke="#009688" stroke-width="2" marker-end="url(#arrow-gray)" />
  <text x="735" y="475" font-size="9" fill="#80cbc4" font-weight="700">WS Channels</text>
</svg>
